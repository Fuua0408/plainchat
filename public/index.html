<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlainChat</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" id="hljsLightTheme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link rel="stylesheet" id="hljsDarkTheme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" disabled>
</head>
<body>

  <section id="loginView" class="view active">
    <form id="loginForm" class="login-box">
      <h1>PlainChat</h1>
      <label>
        ユーザー名
        <input id="loginUsername" type="text" autocomplete="username" required>
      </label>
      <label>
        パスワード
        <input id="loginPassword" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">ログイン</button>
      <p id="loginError" class="error-text"></p>
    </form>
  </section>

  <section id="chatView" class="view">
    <aside class="sidebar">
      <button id="newConversationBtn" type="button" class="new-conversation-btn">+ 新しい会話</button>

      <div class="conversation-search">
        <div class="search-input-wrap">
          <input id="searchInput" type="text" class="search-input" placeholder="会話を検索">
          <button id="searchClearBtn" type="button" class="search-clear-btn" aria-label="検索をクリア" hidden>×</button>
        </div>
        <button id="dateFilterToggleBtn" type="button" class="date-filter-toggle-btn" aria-expanded="false">📅 日付で絞り込み</button>
        <div id="dateFilterPanel" class="date-filter-panel" hidden>
          <label>
            From
            <input id="dateFromInput" type="date">
          </label>
          <label>
            To
            <input id="dateToInput" type="date">
          </label>
        </div>
      </div>

      <ul id="conversationList" class="conversation-list"></ul>
      <button id="themeToggleBtn" type="button" class="theme-toggle-btn">🌙 ダーク</button>
      <button id="settingsBtn" type="button" class="settings-btn">⚙ 設定</button>
      <button id="mcpAdminBtn" type="button" class="settings-btn" hidden>🔌 MCPサーバー設定</button>
      <button id="logoutBtn" type="button" class="logout-btn">ログアウト</button>
    </aside>

    <main id="chatPane" class="chat-pane">
      <div class="chat-header">
        <button id="conversationSettingsBtn" type="button" class="conversation-settings-btn" disabled>会話設定</button>
      </div>
      <div id="messageList" class="message-list"></div>
      <p id="chatError" class="error-text"></p>
      <div id="attachPreviewList" class="attach-preview-list" hidden></div>
      <form id="chatForm" class="chat-input-form">
        <input id="attachInput" type="file" accept="image/*" multiple hidden>
        <button id="attachBtn" type="button" class="attach-btn" title="画像を添付" aria-label="画像を添付">📎</button>
        <input id="attachFileInput" type="file" accept=".txt,.md,.csv,.json,text/plain,text/markdown,text/csv,application/json" multiple hidden>
        <button id="attachFileBtn" type="button" class="attach-btn" title="ファイルを添付" aria-label="ファイルを添付">📄</button>
        <textarea id="chatInput" placeholder="メッセージを入力（Enterで送信、Shift+Enterで改行）" rows="2"></textarea>
        <button id="sendBtn" type="submit">送信</button>
      </form>
      <div id="dragDropOverlay" class="drag-drop-overlay" hidden>ファイルをドロップして添付</div>
    </main>
  </section>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button id="modalCloseBtn" type="button" class="modal-close-btn" aria-label="閉じる">×</button>
      </div>
      <div class="modal-body">
        <textarea id="modalTextarea" rows="10"></textarea>
        <p id="modalMessage" class="modal-message"></p>
      </div>
      <div class="modal-footer">
        <button id="modalSaveBtn" type="button" class="modal-save-btn">保存</button>
      </div>
    </div>
  </div>

  <div id="mcpModalOverlay" class="modal-overlay">
    <div class="modal-box mcp-modal-box">
      <div class="modal-header">
        <h2>MCPサーバー設定</h2>
        <button id="mcpModalCloseBtn" type="button" class="modal-close-btn" aria-label="閉じる">×</button>
      </div>
      <div class="modal-body">
        <p class="mcp-modal-note">保存しても実接続はされません（「MCP再接続」ボタンまたは再起動で反映されます）。</p>
        <p id="mcpListMessage" class="modal-message"></p>
        <ul id="mcpServerList" class="mcp-server-list"></ul>
        <div class="mcp-toolbar">
          <button id="mcpAddServerBtn" type="button" class="mcp-add-btn">+ サーバーを追加</button>
          <button id="mcpReloadBtn" type="button" class="mcp-reload-btn">🔄 MCP再接続</button>
        </div>
        <p id="mcpReloadResult" class="mcp-reload-result"></p>

        <div id="mcpServerForm" class="mcp-server-form" hidden>
          <h3 id="mcpFormTitle">サーバーを追加</h3>
          <label>
            ラベル
            <input id="mcpFormLabel" type="text" placeholder="例: searxng">
          </label>
          <label class="mcp-form-row">
            <input id="mcpFormEnabled" type="checkbox">
            有効
          </label>

          <label id="mcpTransportSelectWrap">
            種別
            <select id="mcpFormTransport">
              <option value="http">HTTP</option>
              <option value="stdio">stdio（カタログ選択）</option>
            </select>
          </label>

          <div id="mcpHttpFields" class="mcp-transport-fields">
            <label>
              URL
              <input id="mcpFormUrl" type="text" placeholder="https://example.com/mcp">
            </label>
            <label>
              認証ヘッダ（1行1件。例: Authorization: Bearer xxx）
              <textarea id="mcpFormHeaders" rows="3" placeholder="Authorization: Bearer ..."></textarea>
            </label>
            <p id="mcpHeadersStatus" class="mcp-secret-status"></p>
          </div>

          <div id="mcpStdioFields" class="mcp-transport-fields" hidden>
            <label>
              カタログ
              <select id="mcpFormCatalog"></select>
            </label>
            <div id="mcpEnvFields"></div>
          </div>

          <p id="mcpFormMessage" class="modal-message"></p>
          <div class="mcp-form-actions">
            <button id="mcpFormCancelBtn" type="button" class="mcp-cancel-btn">キャンセル</button>
            <button id="mcpFormSaveBtn" type="button" class="modal-save-btn">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
